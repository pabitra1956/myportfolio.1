<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pabitra | Portfolio</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; text-align: center; }
        header { background: #0366d6; color: white; padding: 40px; }
        
        /* Switch/Tab Styling */
        .tab-container { margin: 20px 0; }
        .tab-btn {
            padding: 12px 25px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            background: #ddd;
            margin: 0 5px;
            border-radius: 5px;
            transition: 0.3s;
        }
        .tab-btn.active { background: #0366d6; color: white; }
        
        /* Content Sections */
        .content-section { 
            display: none; 
            max-width: 800px; 
            margin: 20px auto; 
            background: white; 
            padding: 20px; 
            border-radius: 10px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .content-section.active { display: block; }
        
        .media-box { width: 100%; border-radius: 8px; margin-top: 15px; }
    </style>
</head>
<body>

<header>
    <h1>Pabitra</h1>
    <p>BCA Student & Cinematographer</p>
</header>

<div class="tab-container">
    <button class="tab-btn active" onclick="openTab('academic')">Academic</button>
    <button class="tab-btn" onclick="openTab('cinematography')">Cinematgraphy</button>
</div>

<!-- ACADEMIC Section -->
<div id="academic" class="content-section active">
    <h2>Academic Records</h2>
    <p>Official Marksheets and Technical Projects (Python/DBMS).</p>
    <!-- Replace 'marksheet.jpg' with your actual uploaded file name -->
    <img src="marksheet.jpg" alt="BCA Marksheet" class="media-box">
</div>

<!-- Cinematography Section -->
<div id="cinematography" class="content-section">
    <h2>Cinematic Works</h2>
    <p>Short films and heritage site captures from Odisha.</p>
    <!-- For YouTube videos, use this format: -->
    <iframe class="media-box" height="400" src="https://www.youtube.com/embed/YOUR_VIDEO_ID" frameborder="0" allowfullscreen></iframe>
</div>

<script>
    function openTab(tabId) {
        // Hide all sections
        document.querySelectorAll('.content-section').forEach(section => {
            section.classList.remove('active');
        });
        // Remove active class from buttons
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('active');
        });
        // Show current tab
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }
</script>

</body>
</html>
